<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>摩天轮参数作答情况统计</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  height: 100vh;
  overflow: hidden;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  color: #fff;
  padding: 10px 20px;
}

.container {
  height: calc(100vh - 20px);
  display: flex;
  flex-direction: column;
  gap: 10px;
}

h1 {
  text-align: center;
  font-size: 1.6em;
  background: linear-gradient(90deg, #48dbfb, #feca57, #ff6b6b);
  background-size: 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: gradient 5s ease infinite;
  flex-shrink: 0;
}

@keyframes gradient {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.overview {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  flex-shrink: 0;
}

.overview-item {
  background: rgba(255,255,255,0.1);
  border-radius: 8px;
  padding: 10px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.15);
}

.overview-item .label { font-size: 0.8em; opacity: 0.7; margin-bottom: 5px; }
.overview-item .value { font-size: 1.8em; font-weight: bold; }
.overview-item .value.blue { color: #48dbfb; }
.overview-item .value.green { color: #1dd1a1; }
.overview-item .value.yellow { color: #feca57; }

.main-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1.2fr;
  gap: 10px;
  flex: 1;
  min-height: 0;
}

.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(8px);
  border-radius: 10px;
  padding: 12px;
  border: 1px solid rgba(255,255,255,0.15);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.card h2 { color: #feca57; margin-bottom: 8px; font-size: 1em; flex-shrink: 0; }

.group-rankings {
  flex: 1;
  overflow-y: auto;
  min-height: 0;
}

.group-rank-item {
  display: flex;
  align-items: center;
  padding: 6px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  font-size: 0.85em;
}

.rank-pos { min-width: 30px; font-weight: bold; color: #feca57; }
.rank-group-name { flex: 1; }
.rank-score { font-weight: bold; padding: 3px 8px; border-radius: 4px; font-size: 0.85em; }
.rank-score.excellent { background: rgba(29,209,161,0.3); color: #1dd1a1; }
.rank-score.good { background: rgba(254,202,87,0.3); color: #feca57; }
.rank-score.poor { background: rgba(255,107,107,0.3); color: #ff6b6b; }

.group-rank-details { display: flex; gap: 10px; margin-left: auto; font-size: 0.8em; opacity: 0.8; }

.bar-chart { flex: 1; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
.bar-item { display: flex; align-items: center; gap: 8px; font-size: 0.85em; }
.bar-label { min-width: 50px; text-align: right; font-weight: bold; }
.bar-track { flex: 1; height: 22px; background: rgba(255,255,255,0.08); border-radius: 10px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 10px; display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; font-weight: bold; font-size: 0.8em; }

.knowledge-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.knowledge-item { padding: 10px; background: rgba(255,255,255,0.05); border-radius: 6px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
.knowledge-item h4 { margin-bottom: 4px; color: #ff9ff3; font-size: 0.9em; }
.knowledge-item .rate { font-size: 1.4em; font-weight: bold; margin: 2px 0; }
.knowledge-item .desc { font-size: 0.75em; opacity: 0.7; }

.level-box { padding: 8px; border-radius: 6px; text-align: center; margin-top: 6px; }
.level-box.nohelp { background: rgba(29,209,161,0.1); border: 1px solid rgba(29,209,161,0.3); }
.level-box.watch { background: rgba(254,202,87,0.1); border: 1px solid rgba(254,202,87,0.3); }
.level-box.critical { background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.3); }
.level-title { font-size: 0.85em; font-weight: bold; }
.level-box.nohelp .level-title { color: #1dd1a1; }
.level-box.watch .level-title { color: #feca57; }
.level-box.critical .level-title { color: #ff6b6b; }
.level-count { font-size: 1.2em; font-weight: bold; }

.levels-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 8px; }

.analysis-box { flex: 1; overflow-y: auto; font-size: 0.85em; line-height: 1.4; }
.analysis-item { margin-bottom: 6px; padding: 8px; background: rgba(255,255,255,0.05); border-radius: 6px; border-left: 3px solid #48dbfb; }
.analysis-item h3 { color: #feca57; margin-bottom: 4px; font-size: 0.9em; }
.teaching-measure { margin-top: 4px; padding: 6px; background: rgba(72,219,251,0.1); border-radius: 4px; border-left: 3px solid #48dbfb; font-size: 0.9em; }
.teaching-measure strong { color: #48dbfb; }

.loading { text-align: center; padding: 100px; font-size: 1.5em; color: #48dbfb; }
.error { text-align: center; padding: 50px; color: #ff6b6b; }
.group-tab { padding: 3px 8px; border: 1px solid rgba(255,255,255,0.2); background: transparent; color: #fff; border-radius: 4px; cursor: pointer; font-size: 0.75em; }
.group-tab.active { background: #48dbfb; border-color: #48dbfb; color: #000; }
</style>
</head>
<body>

<div class="container">
  <h1>🎡 摩天轮参数作答情况统计</h1>
  
  <div class="overview" id="overview"></div>
  
  <div class="main-grid">
    <div class="card">
      <h2>🏆 小组排名</h2>
      <div class="group-rankings" id="rankings"></div>
    </div>
    
    <div class="card">
      <h2>📊 小组平均分对比</h2>
      <div class="bar-chart" id="barChart"></div>
      
      <h2 style="margin-top: 10px;">🎯 小组分层</h2>
      <div class="levels-grid" id="levelSection"></div>
    </div>
    
    <div class="card">
      <h2>📚 知识点掌握分析 <span style="font-size:0.7em; opacity:0.7; float:right;">点击小组查看</span></h2>
      <div id="knowledgeTabs" style="margin-bottom: 8px;"></div>
      <div id="knowledgeContent"></div>
      
      <h2 style="margin-top: 10px;">💡 教学分析与建议</h2>
      <div class="analysis-box" id="analysisContent"></div>
    </div>
  </div>
  
  <div id="loading" class="loading">正在获取数据...</div>
  <div id="error" class="error" style="display: none;"></div>
</div>

<script>
const API_URL = 'https://quickform.cn/api/e5e982atsm/all';
const CORRECT = { r: 18, omega: 0.01, phi: -90, h: 23 };
const TOLERANCE = 0.01;
const PARAM_LABELS = { r: '半径 r', omega: '角速度 ω', phi: '初相 φ', h: '高度 h₀' };

async function loadData() {
  try {
    const response = await fetch(API_URL);
    const data = await response.json();
    const submissions = data.submissions || data.data || data;
    if (!Array.isArray(submissions)) throw new Error('数据格式错误');
    processSubmissions(submissions);
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = '获取数据失败: ' + e.message;
  }
}

function processSubmissions(submissions) {
  document.getElementById('loading').style.display = 'none';
  
  const groupStats = {};
  submissions.forEach(sub => {
    const studentId = sub.studentId || '匿名';
    const answers = sub.answers || {};
    Object.entries(answers).forEach(([groupNum, groupAns]) => {
      if (!groupStats[groupNum]) groupStats[groupNum] = { scores: [], paramCorrect: { r:0, omega:0, phi:0, h:0 }, paramTotal: { r:0, omega:0, phi:0, h:0 } };
      let score = 0;
      Object.keys(CORRECT).forEach(key => {
        groupStats[groupNum].paramTotal[key]++;
        const userVal = parseFloat(groupAns[key]);
        if (!isNaN(userVal) && Math.abs(userVal - CORRECT[key]) < TOLERANCE) { score += 25; groupStats[groupNum].paramCorrect[key]++; }
      });
      groupStats[groupNum].scores.push(score);
      groupStats[groupNum].studentId = studentId;
    });
  });
  
  const groupRankings = [];
  Object.entries(groupStats).forEach(([groupNum, stats]) => {
    const avgScore = stats.scores.length ? Math.round(stats.scores.reduce((a,b)=>a+b,0)/stats.scores.length) : 0;
    const paramRates = {};
    Object.keys(CORRECT).forEach(key => { paramRates[key] = stats.paramTotal[key] > 0 ? Math.round((stats.paramCorrect[key]/stats.paramTotal[key])*100) : 0; });
    groupRankings.push({ groupNum: parseInt(groupNum), avgScore, maxScore: Math.max(...stats.scores)||0, minScore: Math.min(...stats.scores)||0, studentCount: stats.scores.length, paramRates, paramCorrect: stats.paramCorrect, paramTotal: stats.paramTotal });
  });
  groupRankings.sort((a,b) => b.avgScore - a.avgScore);
  
  document.querySelectorAll('#loading, #error').forEach(el => el.style.display = 'none');
  document.querySelector('.overview').style.display = 'grid';
  document.querySelector('.main-grid').style.display = 'grid';
  
  renderOverview(groupRankings);
  renderRankings(groupRankings);
  renderBarChart(groupRankings);
  renderKnowledgeAnalysis(groupRankings);
  renderLevels(groupRankings);
  renderAnalysis(groupRankings);
}

function renderOverview(groupRankings) {
  const totalGroups = groupRankings.length;
  const avgScore = totalGroups ? Math.round(groupRankings.reduce((s,g)=>s+g.avgScore,0)/totalGroups) : 0;
  const topGroup = groupRankings[0]?.groupNum || '-';
  const fullMarkGroups = groupRankings.filter(g => g.avgScore === 100).length;
  document.getElementById('overview').innerHTML = `
    <div class="overview-item"><div class="label">参与小组数</div><div class="value blue">${totalGroups}</div></div>
    <div class="overview-item"><div class="label">总平均分</div><div class="value yellow">${avgScore}</div></div>
    <div class="overview-item"><div class="label">最高分小组</div><div class="value green">第 ${topGroup} 组</div></div>
    <div class="overview-item"><div class="label">满分小组数</div><div class="value green">${fullMarkGroups}</div></div>`;
}

function renderRankings(groupRankings) {
  document.getElementById('rankings').innerHTML = groupRankings.map((g, i) => {
    const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
    const sClass = g.avgScore>=100?'excellent':g.avgScore>=50?'good':'poor';
    return `<div class="group-rank-item"><span class="rank-pos">${i+1}</span><span class="rank-group-name">第 ${g.groupNum} 组 ${medal}</span><span class="rank-score ${sClass}">${g.avgScore}分</span><div class="group-rank-details"><span>人数:${g.studentCount}</span><span>最高:${g.maxScore}</span><span>最低:${g.minScore}</span></div></div>`;
  }).join('');
}

function renderBarChart(groupRankings) {
  document.getElementById('barChart').innerHTML = groupRankings.map(g => {
    const color = g.avgScore>=100?'#1dd1a1':g.avgScore>=50?'#feca57':'#ff6b6b';
    return `<div class="bar-item"><span class="bar-label">第 ${g.groupNum} 组</span><div class="bar-track"><div class="bar-fill" style="width:${Math.max(g.avgScore,5)}%;background:${color};">${g.avgScore}分</div></div></div>`;
  }).join('');
}

function renderKnowledgeAnalysis(groupRankings) {
  const params = [{key:'r',name:'半径 r'},{key:'omega',name:'角速度 ω'},{key:'phi',name:'初相 φ'},{key:'h',name:'高度 h₀'}];
  let tabsHtml = `<button class="group-tab active" data-group="all">全部</button>`;
  groupRankings.forEach(g => { tabsHtml += `<button class="group-tab" data-group="${g.groupNum}">第 ${g.groupNum} 组</button>`; });
  document.getElementById('knowledgeTabs').innerHTML = tabsHtml;
  
  const render = (groupKey) => {
    const filtered = groupKey==='all' ? groupRankings : groupRankings.filter(g=>g.groupNum==groupKey);
    let html = `<div class="knowledge-grid">${params.map(p => {
      let tc=0, ta=0;
      filtered.forEach(g => { tc += g.paramCorrect[p.key]||0; ta += g.paramTotal[p.key]||0; });
      const rate = ta ? Math.round(tc/ta*100) : 0;
      const color = rate>=80?'#1dd1a1':rate>=60?'#feca57':'#ff6b6b';
      return `<div class="knowledge-item"><h4>${p.name}</h4><div class="rate" style="color:${color};">${rate}%</div><div class="desc">${tc}/${ta}人次掌握</div></div>`;
    }).join('')}</div>`;
    document.getElementById('knowledgeContent').innerHTML = html;
  };
  
  document.getElementById('knowledgeTabs').addEventListener('click', e => {
    if (e.target.classList.contains('group-tab')) {
      document.querySelectorAll('.group-tab').forEach(t=>t.classList.remove('active'));
      e.target.classList.add('active');
      render(e.target.dataset.group);
    }
  });
  render('all');
}

function renderLevels(groupRankings) {
  const noHelp = groupRankings.filter(g => g.avgScore===100);
  const needWatch = groupRankings.filter(g => g.avgScore>=50 && g.avgScore<100);
  const critical = groupRankings.filter(g => g.avgScore<50);
  document.getElementById('levelSection').innerHTML = `
    <div class="level-box nohelp"><div class="level-title">不需帮助 (100分)</div><div class="level-count">${noHelp.length}组</div><div style="font-size:0.75em;opacity:0.7;">${noHelp.length?'第 '+noHelp.map(g=>g.groupNum).join('、')+' 组':'无'}</div></div>
    <div class="level-box watch"><div class="level-title">需要关注 (50-99分)</div><div class="level-count">${needWatch.length}组</div><div style="font-size:0.75em;opacity:0.7;">${needWatch.length?needWatch.map(g=>`第${g.groupNum}(${g.avgScore}分)`).join('、'):'无'}</div></div>
    <div class="level-box critical"><div class="level-title">急需干预 (0-49分)</div><div class="level-count">${critical.length}组</div><div style="font-size:0.75em;opacity:0.7;">${critical.length?critical.map(g=>`第${g.groupNum}(${g.avgScore}分)`).join('、'):'无'}</div></div>`;
}

function renderAnalysis(groupRankings) {
  const totalGroups = groupRankings.length;
  const avgScore = totalGroups ? Math.round(groupRankings.reduce((s,g)=>s+g.avgScore,0)/totalGroups) : 0;
  const noHelp = groupRankings.filter(g => g.avgScore===100);
  const needWatch = groupRankings.filter(g => g.avgScore>=50 && g.avgScore<100);
  const critical = groupRankings.filter(g => g.avgScore<50);
  const weakParams = [];
  if (groupRankings.length) {
    Object.keys(CORRECT).forEach(key => {
      let tc=0, ta=0;
      groupRankings.forEach(g => { tc+=g.paramCorrect[key]||0; ta+=g.paramTotal[key]||0; });
      const rate = ta ? Math.round(tc/ta*100) : 100;
      if (rate<70) weakParams.push({key, rate, label: PARAM_LABELS[key]});
    });
  }
  
  let html = `<div class="analysis-item"><h3>📈 整体概况</h3><p>参与 <strong>${totalGroups}</strong> 组，平均分 <strong>${avgScore}</strong>。${avgScore>=80?'优秀':avgScore>=60?'良好':avgScore>=40?'一般':'需提高'}。</p></div>`;
  if (critical.length) html += `<div class="analysis-item"><h3>⚠️ 急需干预 (${critical.length}组)</h3><p>第 ${critical.map(g=>g.groupNum).join('、')} 组低于50分。</p><div class="teaching-measure"><strong>措施：</strong>课后辅导，图形化演示，优秀生帮扶。</div></div>`;
  if (needWatch.length) html += `<div class="analysis-item"><h3>👀 需要关注 (${needWatch.length}组)</h3><p>第 ${needWatch.map(g=>g.groupNum).join('、')} 组中等水平。</p><div class="teaching-measure"><strong>措施：</strong>专项练习，组内互助。</div></div>`;
  if (noHelp.length) html += `<div class="analysis-item"><h3>✅ 不需帮助 (${noHelp.length}组)</h3><p>第 ${noHelp.map(g=>g.groupNum).join('、')} 组满分。</p><div class="teaching-measure"><strong>措施：</strong>拓展任务，经验分享。</div></div>`;
  if (weakParams.length) html += `<div class="analysis-item"><h3>🔧 薄弱知识点</h3><p>${weakParams.map(p=>`<strong>${p.label}</strong>(${p.rate}%)`).join('、')}。</p><div class="teaching-measure"><strong>措施：</strong>专题讲解，动态演示。</div></div>`;
  
  document.getElementById('analysisContent').innerHTML = html;
}

loadData();
</script>

</body>
</html>
